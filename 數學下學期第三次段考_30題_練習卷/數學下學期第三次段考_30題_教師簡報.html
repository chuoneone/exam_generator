<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學科七年級下學期第三次段考複習卷 - 教師講解簡報</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- KaTeX CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true}]});"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #0f766e;
            --primary-light: #e0f2f1;
            --primary-hover: #115e59;
            --accent: #b45309;
            --highlight-bg: #fffde7;
            --highlight-underline: #26a69a;
            --option-correct: #d1fae5;
            --option-correct-border: #10b981;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #2dd4bf;
            --primary-light: #115e59;
            --primary-hover: #14b8a6;
            --accent: #f59e0b;
            --highlight-bg: #423b0f;
            --highlight-underline: #2dd4bf;
            --option-correct: #064e3b;
            --option-correct-border: #10b981;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }

        body {
            font-family: "LXGW WenKai TC", cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 頂部工具列 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.5rem;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 55px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button, select {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background-color: var(--surface);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
            outline: none;
        }

        button:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        button.active {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        /* 簡報主畫面區域 */
        .slide-area {
            flex-grow: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
            height: calc(100vh - 105px); /* navbar:55px + footer:50px */
            box-sizing: border-box;
            position: relative;
            font-size: calc(1rem * var(--font-scale, 1.0));
        }

        .panel {
            background-color: var(--surface);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .preamble-panel {
            width: 40%;
            display: flex;
            flex-direction: column;
            border-left: 5px solid var(--primary);
        }

        .question-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .preamble-title {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.3em;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .preamble-text {
            font-size: 1.35em;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .preamble-text span:hover, .question-text span.non-option:hover {
            background-color: var(--highlight-bg);
            cursor: pointer;
        }

        .speaking {
            background-color: var(--highlight-bg) !important;
            text-decoration: underline;
            text-decoration-color: var(--highlight-underline);
            text-decoration-thickness: 3px;
        }

        .question-text {
            font-size: 1.55em;
            font-weight: 700;
            line-height: 1.6;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-item {
            font-size: 1.3em;
            padding: 0.75rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background-color: var(--bg);
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover {
            border-color: var(--primary);
            background-color: var(--highlight-bg);
        }

        .option-item.correct {
            background-color: var(--option-correct) !important;
            border-color: var(--option-correct-border) !important;
            font-weight: 700;
        }

        /* 答案與解析區塊 */
        .explanation-box {
            margin-top: auto;
            background-color: var(--primary-light);
            border-left: 5px solid var(--accent);
            padding: 1rem;
            border-radius: 0.375rem;
            font-size: 1.2em;
            line-height: 1.6;
        }

        .ans-label {
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        /* 白板畫板 Overlay */
        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #drawing-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 畫筆工具列 */
        .canvas-toolbar {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: flex;
            gap: 0.75rem;
            box-shadow: var(--shadow-lg);
            align-items: center;
            z-index: 15;
            pointer-events: auto;
            transition: opacity 0.3s;
        }

        .canvas-toolbar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .color-dot {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .color-dot.active {
            border-color: var(--text-main);
        }

        .canvas-divider {
            width: 1px;
            height: 1.25rem;
            background-color: var(--border);
        }

        /* 底部頁碼與資訊列 */
        .footer {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            box-sizing: border-box;
            z-index: 10;
        }

        .pager {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .shortcut-legend {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 語音設定摺疊面板 */
        .settings-panel {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            transition: max-height 0.3s ease-out, opacity 0.3s, padding 0.3s;
            max-height: 200px;
            opacity: 1;
            overflow: hidden;
            display: flex;
            gap: 2rem;
            align-items: center;
            z-index: 9;
        }

        .settings-panel.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .speed-slider-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #speed-control {
            width: 100px;
            cursor: pointer;
        }
    </style>
</head>
<body>

        <div class="control-group">

    <script>
        const questions = [
            {

        const stopIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5z"/></svg><span>停止</span>`;

        let activeSequence = [];
        let activeSequenceIndex = -1;

        // Math utilities
        function formatMathText(text) {
            return text || '';
        }

        function cleanTextForTTS(text) {
            if (!text) return '';
            let cleaned = text;
            cleaned = cleaned
                .replace(/\\times/g, '乘以')
                .replace(/\\div/g, '除以')
                .replace(/×/g, '乘以')
                .replace(/÷/g, '除以')
                .replace(/\\pm/g, '正負')
                .replace(/\\le/g, '小於或等於')
                .replace(/\\ge/g, '大於或等於')
                .replace(/\\neq/g, '不等於')
                .replace(/\\approx/g, '約等於')
                .replace(/\\degree/g, '度')
                .replace(/\^\\circ/g, '度')
                .replace(/\\pi/g, '圓周率')
                .replace(/\\theta/g, '西塔')
                .replace(/\\triangle/g, '三角形')
                .replace(/\\Delta/g, '三角形')
                .replace(/\\angle/g, '角')
                .replace(/\\parallel/g, '平行')
                .replace(/\\perp/g, '垂直')
                .replace(/\\sim/g, '相似於')
                .replace(/\\cong/g, '全等於')
                .replace(/\\odot/g, '圓')
                .replace(/\\sqrt\{([^}]+)\}/g, '根號$1')
                .replace(/=/g, '等於')
                .replace(/＝/g, '等於');

            cleaned = cleaned.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$2分之$1');
            cleaned = cleaned.replace(/\(([^)]+)\)\/\(([^)]+)\)/g, '$2分之$1');
            cleaned = cleaned.replace(/(\d+)\/(\d+)/g, '$2分之$1');

            cleaned = cleaned.replace(/\^\{([^}]+)\}/g, '的$1次方');
            cleaned = cleaned.replace(/\^([a-zA-Z0-9]+)/g, '的$1次方');
            cleaned = cleaned.replace(/的2次方/g, '平方');
            cleaned = cleaned.replace(/的3次方/g, '立方');

            cleaned = cleaned.replace(/([\d\w)]+)\s*[:：]\s*([\d\w(]+)/g, '$1比$2');
            cleaned = cleaned.replace(/\$/g, '').replace(/\\/g, '');
            return cleaned;
        }

        // Canvas Handlers
        function setupCanvas() {
            canvas.width = canvasContainer.clientWidth;
            canvas.height = canvasContainer.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = currentPenColor;
            ctx.lineWidth = currentPenWidth;
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            if (!isPenActive) return;
            isDrawing = true;
            const { x, y } = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing || !isPenActive) return;
            const { x, y } = getCoords(e);
            if (currentPenColor === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 20;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentPenColor;
                ctx.lineWidth = currentPenWidth;
            }
            ctx.lineTo(x, y);
            ctx.stroke();
            e.preventDefault();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function saveDrawing() {
            drawingHistory[currentQuestionIndex] = canvas.toDataURL();
        }

        function restoreDrawing(index) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (drawingHistory[index]) {
                const img = new Image();
                img.src = drawingHistory[index];
                img.onload = () => {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        // TTS Handlers
        function populateVoiceList() {
            voices = synth.getVoices().filter(voice => voice.lang.startsWith('zh'));
            voiceSelectEl.innerHTML = '';
            if (voices.length === 0) {
                const o = document.createElement('option');
                o.textContent = '找不到中文語音';
                voiceSelectEl.appendChild(o);
                return;
            }
            voices.forEach((voice, i) => {
                const o = document.createElement('option');
                o.textContent = voice.name;
                o.value = i;
                voiceSelectEl.appendChild(o);
            });
            let idx = voices.findIndex(v => v.name.includes('Yating') && v.lang === 'zh-TW');
            if (idx === -1) idx = voices.findIndex(v => v.name === 'Google 國語（臺灣）');
            if (idx === -1) idx = 0;
            if (voices[idx]) {
                voiceSelectEl.selectedIndex = idx;
            }
        }
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = populateVoiceList;
        }

        function stopSequence() {
            activeSequence = [];
            activeSequenceIndex = -1;
            synth.cancel();
            document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
            ttsPlayBtn.innerHTML = playIcon;
        }

        function playNextInSequence() {
            if (activeSequenceIndex < 0 || activeSequenceIndex >= activeSequence.length) {
                stopSequence();
                return;
            }
            const item = activeSequence[activeSequenceIndex];
            document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
            item.element.classList.add('speaking');
            
            item.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            const cleanText = cleanTextForTTS(item.text);
            const u = new SpeechSynthesisUtterance(cleanText);
            u.lang = 'zh-TW';
            u.rate = parseFloat(speedControl.value);
            const i = voiceSelectEl.value;
            if (voices[i]) u.voice = voices[i];

            u.onend = () => {
                activeSequenceIndex++;
                playNextInSequence();
            };
            u.onerror = () => {
                activeSequenceIndex++;
                playNextInSequence();
            };
            utterance = u;
            synth.speak(u);
        }

        function speakAndHighlight(text, element) {
            stopSequence();
            element.classList.add('speaking');
            const cleanText = cleanTextForTTS(text);
            const u = new SpeechSynthesisUtterance(cleanText);
            u.lang = 'zh-TW';
            u.rate = parseFloat(speedControl.value);
            const i = voiceSelectEl.value;
            if (voices[i]) u.voice = voices[i];

            const cleanup = () => {
                element.classList.remove('speaking');
                u.onend = null;
                u.onerror = null;
            };
            u.onend = cleanup;
            u.onerror = cleanup;
            
            utterance = u;
            synth.speak(u);
        }

        // Render Slide
        function getActivePreamble(index) {
            const q = questions[index];
            if (q.preamble) return q.preamble;
            for (let i = index - 1; i >= 0; i--) {
                const prevQ = questions[i];
                if (prevQ.section !== q.section) break;
                if (prevQ.preamble) return prevQ.preamble;
            }
            return null;
        }

        function renderPreamble(text) {
            preambleTextEl.innerHTML = '';
            if (!text) {
                preamblePanel.style.display = 'none';
                return;
            }
            preamblePanel.style.display = 'flex';
            const formattedText = formatMathText(text);
            formattedText.split('\n').filter(p => p.trim() !== '').forEach(pText => {
                const pEl = document.createElement('p');
                (pText.match(/[^。？！…，,]+([。？！…，,]|…{2,})?/g) || [pText]).forEach(sText => {
                    const span = document.createElement('span');
                    span.textContent = sText;
                    span.addEventListener('click', e => {
                        if (!isPenActive) speakAndHighlight(e.currentTarget.textContent, e.currentTarget);
                    });
                    pEl.appendChild(span);
                });
                preambleTextEl.appendChild(pEl);
            });
        }

        function renderQuestion(index) {
            const q = questions[index];
            
            // Render Preamble
            const activePreamble = getActivePreamble(index);
            if (activePreamble !== currentPreamble) {
                renderPreamble(activePreamble);
                currentPreamble = activePreamble;
            }

            // Render Question Text
            questionTextEl.innerHTML = '';
            const formattedQuestion = formatMathText(q.question);
            if (q.questionReadText) {
                const span = document.createElement('span');
                span.className = 'non-option';
                span.textContent = formattedQuestion;
                span.setAttribute('data-read-text', q.questionReadText);
                span.addEventListener('click', e => {
                    if (!isPenActive) speakAndHighlight(e.currentTarget.getAttribute('data-read-text'), e.currentTarget);
                });
                questionTextEl.appendChild(span);
            } else {
                formattedQuestion.split('\n').flatMap(line => line.match(/[^。？！…，,]+([。檔案！…，,]|…{2,})?/g) || [line]).forEach(sText => {
                    if (sText.trim() === '') return;
                    const span = document.createElement('span');
                    span.className = 'non-option';
                    span.textContent = sText;
                    span.addEventListener('click', e => {
                        if (!isPenActive) speakAndHighlight(e.currentTarget.textContent, e.currentTarget);
                    });
                    questionTextEl.appendChild(span);
                });
            }

            // Render Options
            optionsListEl.innerHTML = '';
            if (q.options && q.options.length > 0) {
                optionsListEl.style.display = showOptionsState ? 'flex' : 'none';
                q.options.forEach((opt, optIdx) => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    
                    const optText = (opt && typeof opt === 'object') ? opt.text : opt;
                    const optReadText = (opt && typeof opt === 'object') ? opt.readText : null;
                    
                    const span = document.createElement('span');
                    span.className = 'read-sentence';
                    if (optReadText) {
                        span.setAttribute('data-read-text', optReadText);
                    }
                    span.textContent = formatMathText(optText);
                    li.appendChild(span);
                    
                    // Highlight correct answer if answer is shown
                    const optLetter = optText.trim().substring(1, 2).toUpperCase(); // e.g. A from (A)
                    if (showAnswerState && q.answer && (optLetter === q.answer.trim().toUpperCase() || optText.includes(q.answer))) {
                        li.classList.add('correct');
                    }

                    li.addEventListener('click', e => {
                        if (!isPenActive) {
                            const clickTarget = e.currentTarget.querySelector('span.read-sentence') || e.currentTarget;
                            speakAndHighlight(clickTarget.getAttribute('data-read-text') || clickTarget.textContent, clickTarget);
                        }
                    });
                    optionsListEl.appendChild(li);
                });
            } else {
                optionsListEl.style.display = 'none';
            }

            // Render Answer & Explanation
            if (showExplanationState && (q.answer || q.explanation)) {
                explanationBoxEl.style.display = 'block';
                let expHTML = '';
                if (q.answer) expHTML += `<strong>答案：${q.answer}</strong><br>`;
                if (q.explanation) expHTML += `${formatMathText(q.explanation)}`;
                explanationTextEl.innerHTML = expHTML;
            } else {
                explanationBoxEl.style.display = 'none';
            }

            // Render KaTeX for all dynamic text elements to render math equations
            if (window.renderMathInElement) {
                const katexOptions = {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ]
                };
                renderMathInElement(questionTextEl, katexOptions);
                renderMathInElement(optionsListEl, katexOptions);
                if (activePreamble && preamblePanel.style.display !== 'none') {
                    renderMathInElement(preambleTextEl, katexOptions);
                }
                if (showExplanationState && (q.answer || q.explanation)) {
                    renderMathInElement(explanationBoxEl, katexOptions);
                }
            }

            // Sync controls
            slideSelect.value = index;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === questions.length - 1;

            // Restore canvas drawing for this slide
            setTimeout(() => {
                restoreDrawing(index);
            }, 50);
        }

        function speakCurrentQuestion() {
            if (activeSequence.length > 0) {
                stopSequence();
                return;
            }
            const q = questions[currentQuestionIndex];
            const seq = [];
            
            if (q.preamble && preamblePanel.style.display !== 'none') {
                preambleTextEl.querySelectorAll('span').forEach(span => {
                    seq.push({ text: span.getAttribute('data-read-text') || span.textContent, element: span });
                });
            }
            questionTextEl.querySelectorAll('span.non-option').forEach(span => {
                seq.push({ text: span.getAttribute('data-read-text') || span.textContent, element: span });
            });
            if (q.options && optionsListEl.style.display !== 'none') {
                optionsListEl.querySelectorAll('li.option-item').forEach(li => {
                    const span = li.querySelector('span.read-sentence') || li;
                    seq.push({ text: span.getAttribute('data-read-text') || li.textContent, element: span });
                });
            }
            if (seq.length === 0) return;
            activeSequence = seq;
            activeSequenceIndex = 0;
            ttsPlayBtn.innerHTML = stopIcon;
            playNextInSequence();
        }

        // Toggle functions
        function toggleOptions() {
            showOptionsState = !showOptionsState;
            toggleOptionsBtn.classList.toggle('active', showOptionsState);
            optionsListEl.style.display = showOptionsState ? 'flex' : 'none';
        }

        function toggleAnswer() {
            showAnswerState = !showAnswerState;
            toggleAnswerBtn.classList.toggle('active', showAnswerState);
            renderQuestion(currentQuestionIndex);
        }

        function toggleExplanation() {
            showExplanationState = !showExplanationState;
            toggleExplanationBtn.classList.toggle('active', showExplanationState);
            renderQuestion(currentQuestionIndex);
        }

        function togglePen() {
            isPenActive = !isPenActive;
            togglePenBtn.classList.toggle('active', isPenActive);
            canvasToolbar.classList.toggle('hidden', !isPenActive);
            canvas.style.pointerEvents = isPenActive ? 'auto' : 'none';
            if (isPenActive) {
                stopSequence();
                setupCanvas();
            }
        }

        function changeSlide(index) {
            if (index < 0 || index >= questions.length) return;
            saveDrawing();
            stopSequence();
            currentQuestionIndex = index;
            renderQuestion(currentQuestionIndex);
        }

        // Event Listeners
        prevBtn.addEventListener('click', () => changeSlide(currentQuestionIndex - 1));
        nextBtn.addEventListener('click', () => changeSlide(currentQuestionIndex + 1));
        slideSelect.addEventListener('change', (e) => changeSlide(parseInt(e.target.value)));
        
        toggleOptionsBtn.addEventListener('click', toggleOptions);
        toggleAnswerBtn.addEventListener('click', toggleAnswer);
        toggleExplanationBtn.addEventListener('click', toggleExplanation);
        togglePenBtn.addEventListener('click', togglePen);
        
        ttsPlayBtn.addEventListener('click', speakCurrentQuestion);
        
        toggleSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('collapsed');
        });

        toggleThemeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        });

        speedControl.addEventListener('input', e => { 
            const s = parseFloat(e.target.value); 
            speedValue.textContent = s.toFixed(1) + 'x'; 
            if (activeSequence.length > 0) {
                synth.cancel();
                playNextInSequence();
            } else if (synth.speaking && utterance) {
                const text = utterance.text;
                synth.cancel();
                speakAndHighlight(text, document.querySelector('.speaking'));
            }
        });

        // Pen colors and tool events
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', e => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentPenColor = e.currentTarget.getAttribute('data-color');
                ctx.globalCompositeOperation = 'source-over';
                document.getElementById('canvas-eraser-btn').classList.remove('active');
            });
        });

        document.getElementById('canvas-eraser-btn').addEventListener('click', e => {
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            currentPenColor = 'eraser';
        });

        document.getElementById('canvas-clear-btn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Keyboard Shortcuts
        window.addEventListener('keydown', e => {
            if (document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'INPUT') {
                return;
            }
            
            switch (e.code) {
                case 'ArrowLeft':
                case 'PageUp':
                    if (currentQuestionIndex > 0) changeSlide(currentQuestionIndex - 1);
                    break;
                case 'ArrowRight':
                case 'PageDown':
                case 'Space':
                    if (currentQuestionIndex < questions.length - 1) changeSlide(currentQuestionIndex + 1);
                    e.preventDefault();
                    break;
                case 'KeyO':
                    toggleOptions();
                    break;
                case 'KeyA':
                    toggleAnswer();
                    break;
                case 'KeyE':
                    toggleExplanation();
                    break;
                case 'KeyP':
                    togglePen();
                    break;
                case 'KeyC':
                    if (isPenActive) ctx.clearRect(0, 0, canvas.width, canvas.height);
                    break;
                case 'KeyD':
                    toggleThemeBtn.click();
                    break;
                case 'Minus':
                case 'NumpadSubtract':
                    updateZoom(fontScale - 0.1);
                    break;
                case 'Equal':
                case 'NumpadAdd':
                    updateZoom(fontScale + 0.1);
                    break;
            }
        });

        // Zoom handlers
        let fontScale = 1.0;
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomValueEl = document.getElementById('zoom-value');

        function updateZoom(scale) {
            fontScale = Math.max(0.7, Math.min(2.0, scale));
            document.documentElement.style.setProperty('--font-scale', fontScale);
            zoomValueEl.textContent = Math.round(fontScale * 100) + '%';
            
            // Re-setup canvas to match scaled sizing
            setTimeout(() => {
                saveDrawing();
                setupCanvas();
                restoreDrawing(currentQuestionIndex);
            }, 50);
        }

        zoomInBtn.addEventListener('click', () => updateZoom(fontScale + 0.1));
        zoomOutBtn.addEventListener('click', () => updateZoom(fontScale - 0.1));

        window.addEventListener('resize', () => {
            saveDrawing();
            setupCanvas();
            restoreDrawing(currentQuestionIndex);
        });

        // Canvas Event Listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // Init
        function init() {
            slideSelect.innerHTML = '';
            let currentSection = "", currentOptgroup = null;
            questions.forEach((q, index) => {
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    currentOptgroup = document.createElement('optgroup');
                    currentOptgroup.label = currentSection;
                    slideSelect.appendChild(currentOptgroup);
                }
                const o = document.createElement('option');
                o.value = index;
                o.textContent = '第 ' + q.displayId + ' 題';
                if (currentOptgroup) currentOptgroup.appendChild(o);
            });
            
            populateVoiceList();
            setupCanvas();
            renderQuestion(currentQuestionIndex);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
